<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captura Webcam — API para Upload de Imagens</title>
  <meta name="description" content="Capture imagens da sua webcam e armazene-as com segurança usando sua sessão única." />

  <!-- Ubuntu + Ubuntu Mono (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="webcam.png" />
  <!-- <a href="https://www.flaticon.com/free-icons/videocam" title="videocam icons">Videocam icons created by Freepik - Flaticon</a> -->

  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      WebCam Capture
    </div>
    <div class="session-bar">
      <span class="session-label">Sessão:</span>
      <div class="session-id-badge" id="session-display" title="Clique para copiar">—</div>
      <button class="btn-icon" id="copy-btn" title="Copiar session ID">⧉</button>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main>

    <!-- Coluna esquerda: câmera + restauração de sessão -->
    <div class="camera-panel">

      <div class="camera-card">
        <div class="camera-header">
          <span class="camera-title">🎥 Câmera ao vivo</span>
          <div class="cam-status">
            <div class="cam-dot" id="cam-dot"></div>
            <span id="cam-status-text">Inativa</span>
          </div>
        </div>

        <div class="video-wrapper">
          <video id="video" autoplay playsinline muted></video>
          <div class="video-overlay" id="video-overlay">
            <span class="cam-icon">📷</span>
            <span>Clique em "Iniciar câmera" para começar</span>
          </div>
          <div class="flash" id="flash"></div>
        </div>

        <div class="camera-controls">
          <button class="btn btn-secondary" id="start-btn">▶ Iniciar câmera</button>
          <button class="btn btn-primary" id="capture-btn" disabled>
            <span id="capture-spinner" class="spinner"></span>
            <span id="capture-label">📸 Capturar imagem</span>
          </button>
          <button class="btn btn-secondary" id="stop-btn" disabled>⏹ Parar câmera</button>
        </div>
      </div>

      <div class="restore-card">
        <h3>🔑 Restaurar sessão existente</h3>
        <div class="input-row">
          <input
            type="text"
            id="restore-input"
            placeholder="Cole seu session ID aqui…"
            spellcheck="false"
            autocomplete="off"
          />
          <button class="btn btn-secondary" id="restore-btn" style="flex-shrink:0;">Carregar</button>
        </div>
      </div>

    </div>

    <!-- Coluna direita: galeria -->
    <div class="gallery-panel">
      <div class="gallery-header">
        <h2>🖼 Minhas capturas</h2>
        <span class="badge" id="count-badge">0</span>
      </div>
      <div class="gallery-grid" id="gallery">
        <div class="gallery-empty">
          <div class="empty-icon">🌑</div>
          <p>Nenhuma imagem capturada ainda.<br>Inicie a câmera e pressione Capturar.</p>
        </div>
      </div>
    </div>

  </main>

  <!-- Canvas oculto usado para capturar frames do vídeo -->
  <canvas id="canvas"></canvas>

  <!-- Toast de notificação -->
  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
